<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SeamlessVet · طباعة</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { background: #EEF1F4; }
    body { margin: 0; padding: 24px; font-family: Tajawal, sans-serif; }

    /* Print sheet: each phone is a 390x780 white card on its own page */
    .sheet {
      width: 390px;
      height: 780px;
      margin: 0 auto 24px;
      background: #fff;
      box-shadow: 0 1px 0 rgba(15,42,68,0.08), 0 18px 48px rgba(15,42,68,0.18);
      border: 1px solid rgba(15,42,68,0.08);
      overflow: hidden;
      position: relative;
      page-break-after: always;
      break-after: page;
    }
    .sheet:last-child { page-break-after: auto; break-after: auto; }

    .caption {
      width: 390px; margin: 0 auto 8px;
      font-size: 12px; color: #59697E; text-align: center; font-weight: 700;
    }

    @page { size: A4 portrait; margin: 12mm; }
    @media print {
      html, body { background: #fff; }
      body { padding: 0; }
      .sheet { box-shadow: none; border: 1px solid #d9dde2; margin: 0 auto; }
      .caption { margin-bottom: 6mm; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- App scripts (no canvas / no tweaks) -->
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="icons-3d.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="screen-auth.jsx"></script>
  <script type="text/babel" src="screen-home.jsx"></script>
  <script type="text/babel" src="screen-visit.jsx"></script>
  <script type="text/babel" src="screen-inventory.jsx"></script>
  <script type="text/babel" src="screen-finance.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const SCREENS = [
      { label: "١ · تسجيل الدخول",            el: <ScreenLogin /> },
      { label: "٢ · في انتظار الموافقة",      el: <ScreenPending /> },
      { label: "٣ · الرئيسية · زيارات اليوم", el: <ScreenHome /> },
      { label: "٤ · اختيار العميل",            el: <ScreenVisitClient /> },
      { label: "٥ · صرف الأدوية من سيارتك",   el: <ScreenVisitMeds /> },
      { label: "٦ · خدمات وتطعيمات",          el: <ScreenVisitServices /> },
      { label: "٧ · مراجعة وتأكيد",           el: <ScreenVisitSummary /> },
      { label: "٨ · تم تسجيل الزيارة",        el: <ScreenVisitDone /> },
      { label: "٩ · المخزون الميداني",         el: <ScreenInventory /> },
      { label: "١٠ · تحميل من المستودع",       el: <ScreenLoad /> },
      { label: "١١ · سند قبض",                 el: <ScreenReceipt /> },
      { label: "١٢ · كشف حساب",                el: <ScreenStatement /> },
    ];

    function PrintDeck() {
      return (
        <div>
          {SCREENS.map((s, i) => (
            <div key={i}>
              <div className="caption">{s.label}</div>
              <div className="sheet">{s.el}</div>
            </div>
          ))}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<PrintDeck />);

    // Wait for fonts + JSX parse, then auto-trigger the print dialog.
    (async () => {
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
      await new Promise(r => setTimeout(r, 500));
      window.print();
    })();
  </script>
</body>
</html>
